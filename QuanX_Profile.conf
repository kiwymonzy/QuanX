#KIWY MONZY 2023
[general]
profile_img_url= https://upload.wikimedia.org/wikipedia/en/1/1f/Tanzania_Telecommunications_Company_Limited_generation_T_logo.png
network_check_url=http://www.google.com
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# Quantumult X will test the URL specified by server_check_url to confirm the useability of the node.

# You can also specify server_check_url parameters separately for nodes and subscriptions in server_local/remote.
server_check_url=http://www.qualcomm.cn/generate_204
# The content in the list below will not be processed by QuantumultX

# The domain name in the dns exclusion list will not use the fake-ip method. Other domain names all adopt the mode of fake-ip and remote resolution.
dns_exclusion_list = *.cmpassport.com,  *.jegotrip.com.cn, *.icitymobile.mobi, *.pingan.com.cn, *.cmbchina.com
# Specify to pause Quantumult X under a certain Wi-Fi

ssid_suspended_list=2.0kiwy

# api and js to obtain and display node information
geo_location_checker=http://ip-api.com/json/?lang=en-TZ, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
# Parameter fallback_udp_policy only supports v1.0.19 and later versions.

# The value of the parameter fallback_udp_policy only supports the terminal policy (the terminal strategy is the policy hit after the rule module and the policy module, such as: direct, reject and node; the built-in policy proxy and other self Define the strategy).

udp_whitelist=53, 123, 1900, 80-443
excluded_routes= 192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8
icmp_auto_reply=true

;Specify DoH  The request is used User-Agent
doh_user_agent=Agent/1.0

;Specify the server used for testing User-Agent
server_check_user_agent = Agent/1.0

// By default DNS Level one domain Be rejectAt that time, it will return. loopback IP。You can use the following parameters.
// Modify to become “no-error-no-answer”，Or “nxdomain”
dns_reject_domain_behavior = loopback
fallback_udp_policy=direct





